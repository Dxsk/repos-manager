name: Check Links

on:
  push:
    branches: [main, develop]
    paths: ['**.md', 'site/**', '.github/workflows/links.yml']
  pull_request:
    branches: [main, develop]
    paths: ['**.md', 'site/**']
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 10:00 Europe/Paris
  workflow_dispatch:

jobs:
  check-markdown:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check links in markdown
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --verbose --no-progress --timeout 30 --accept '200..=399,429' --exclude 'buymeacoffee\.com' '**/*.md'
          fail: true

  check-site:
    name: Site links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: site

      - run: pnpm run build
        working-directory: site

      - name: Check links in built site
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --verbose --no-progress --timeout 30 --accept '200..=399,429' --exclude 'buymeacoffee\.com' --root-dir site/_site 'site/_site/**/*.html'
          fail: true
