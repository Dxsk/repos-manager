name: Check Links

on:
  push:
    branches: [main, develop]
    paths: ['**.md', 'site/**', '.github/workflows/links.yml']
  pull_request:
    branches: [main, develop]
    paths: ['**.md', 'site/**']
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 10:00 Europe/Paris
  workflow_dispatch:

jobs:
  check-markdown:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check links in markdown
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2
        with:
          args: --verbose --no-progress --timeout 30 --accept '200..=399,429' '**/*.md'
          fail: true

  check-site:
    name: Site links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642195b5e65ec0cc5acb848 # v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: site

      - run: npm run build
        working-directory: site

      - name: Check links in built site
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2
        with:
          args: --verbose --no-progress --timeout 30 --accept '200..=399,429' --root-dir site/_site 'site/_site/**/*.html'
          fail: true
