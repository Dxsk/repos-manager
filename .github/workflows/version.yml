name: Auto Version

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'site/**'
      - 'docs/**'

permissions:
  contents: write

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          tag=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [[ -z "$tag" ]]; then
            # No tags exist: read version from script as baseline
            tag="v$(grep '^VERSION=' repos-manager.sh | cut -d'"' -f2)"
            echo "baseline=true" >> "$GITHUB_OUTPUT"
          fi
          echo "latest=$tag" >> "$GITHUB_OUTPUT"

      - name: Determine bump type from commits
        id: bump
        run: |
          latest="${{ steps.tag.outputs.latest }}"

          if [[ "${{ steps.tag.outputs.baseline }}" == "true" ]]; then
            # No previous tag: check all unreleased commits
            commits=$(git log --pretty=format:"%s")
          else
            commits=$(git log "$latest"..HEAD --pretty=format:"%s")
          fi

          if [[ -z "$commits" ]]; then
            echo "type=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bump="none"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^feat(\(.*\))?!:|BREAKING CHANGE'; then
              bump="major"
              break
            elif echo "$msg" | grep -qE '^feat(\(.*\))?:'; then
              if [[ "$bump" != "major" ]]; then
                bump="minor"
              fi
            elif echo "$msg" | grep -qE '^fix(\(.*\))?:'; then
              if [[ "$bump" == "none" ]]; then
                bump="patch"
              fi
            fi
          done <<< "$commits"

          echo "type=$bump" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: version
        if: steps.bump.outputs.type != 'none'
        run: |
          current="${{ steps.tag.outputs.latest }}"
          current="${current#v}"
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          echo "new=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Bump version files
        if: steps.bump.outputs.type != 'none'
        run: |
          version="${{ steps.version.outputs.new }}"
          sed -i "s/^VERSION=\".*\"/VERSION=\"${version}\"/" repos-manager.sh
          sed -i "s/\"version\": \".*\"/\"version\": \"${version}\"/" site/src/_data/site.json
          sed -i "s/repos-manager [0-9]\+\.[0-9]\+\.[0-9]\+/repos-manager ${version}/" tests/cli.bats
          sed -i "s/version = \".*\";/version = \"${version}\";/" flake.nix

      - name: Commit and tag
        if: steps.bump.outputs.type != 'none'
        run: |
          version="${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos-manager.sh site/src/_data/site.json tests/cli.bats flake.nix
          git commit -m "chore: bump version to v${version}"
          git tag "v${version}"
          git push origin main --tags
