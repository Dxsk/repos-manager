name: Build and Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'readme.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642195b5e65ec0cc5acb848 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci
        working-directory: site

      - run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@56afc609e74202571920e5bb08c29e20746f610f # v3
        with:
          path: site/_site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://repos-manager.dxscloud.fr
    steps:
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
